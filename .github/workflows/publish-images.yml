name: Publish container images

# Builds and pushes four images to ghcr.io: app / storage-local /
# postgres / whatsapp-sidecar. Pushing to master publishes `latest` + short commit sha;
# manual runs can override the tag and platforms. Multi-arch via QEMU
# emulation (slower than native runners, but a single workflow covers
# both linux/amd64 and linux/arm64). End-user compose stacks resolve
# whichever architecture matches the host without any extra config.

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (e.g. latest, v0.1.0). Also pushed as the second tag alongside the short commit sha."
        required: true
        default: latest
        type: string
      platforms:
        description: "Comma-separated buildx platforms. Drop linux/arm64 if the run is timing out."
        required: true
        default: "linux/amd64,linux/arm64"
        type: string

# ghcr.io auth uses the per-job GITHUB_TOKEN; `packages: write` lets
# it push package versions under the repo owner's namespace.
permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}
      PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'linux/amd64,linux/arm64' }}
    strategy:
      # Don't abort the other matrix entries if one fails — a partial publish
      # (e.g. only app pushed) is still useful for diagnosing which
      # Dockerfile blew up; the operator can re-run for the rest.
      fail-fast: false
      matrix:
        include:
          - name: app
            dockerfile: docker/app/Dockerfile
          - name: storage-local
            dockerfile: docker/storage-local/Dockerfile
          - name: postgres
            dockerfile: docker/postgres/Dockerfile
          - name: whatsapp-sidecar
            dockerfile: docker/whatsapp-sidecar/Dockerfile
    name: ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yuralume-core/${{ matrix.name }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=sha,prefix=sha-

      - name: Compute build time
        id: build_time
        shell: bash
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            YURALUME_BUILD_TAG=${{ env.IMAGE_TAG }}
            YURALUME_BUILD_SHA=${{ github.sha }}
            YURALUME_BUILD_TIME=${{ steps.build_time.outputs.value }}
            VITE_YURALUME_DEMO_DISCORD_CLIENT_ID=${{ vars.VITE_YURALUME_DEMO_DISCORD_CLIENT_ID }}
            VITE_YURALUME_DEMO_GOOGLE_CLIENT_ID=${{ vars.VITE_YURALUME_DEMO_GOOGLE_CLIENT_ID }}
            VITE_YURALUME_DEMO_TIER0_URL=${{ vars.VITE_YURALUME_DEMO_TIER0_URL }}
            VITE_YURALUME_DEMO_WAITLIST_URL=${{ vars.VITE_YURALUME_DEMO_WAITLIST_URL }}
            VITE_YURALUME_DEMO_DISCORD_URL=${{ vars.VITE_YURALUME_DEMO_DISCORD_URL }}
            VITE_YURALUME_DEMO_SELF_HOST_URL=${{ vars.VITE_YURALUME_DEMO_SELF_HOST_URL }}
          # Layer cache shared across runs for this matrix entry —
          # rebuilds that touch only `src/` or `frontend/` skip the
          # base-image + dependency layers.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
