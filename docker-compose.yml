services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yuralume-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kokoro
      POSTGRES_PASSWORD: kokoro_dev
      POSTGRES_DB: kokoro_link
    ports:
      - "5544:5432"
    volumes:
      - kokoro_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kokoro -d kokoro_link"]
      interval: 3s
      timeout: 3s
      retries: 30

volumes:
  kokoro_postgres_data:
    name: kokoro_postgres_data
