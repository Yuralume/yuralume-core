# Core universal story seeds.
#
# These work for any ``world_frame`` — dreams, emotions, inner thoughts,
# things that can happen regardless of setting. The expander LLM adapts
# details to the character's voice + world.
#
# Format per entry:
#   external_id  : stable id for idempotent re-import (must be unique
#                  across all packs). Convention: ``<pack>:<category>:<n>``.
#   seed_text    : one-line Chinese prompt.
#   tags         : descriptive labels (no vocabulary enforced).
#   world_frames : which frames this seed fits. ``any`` = all.
#   weight       : relative draw weight (default 1.0).
#   cooldown_days: minimum days between the same seed for one character.
pack_id: core_universal
language: zh-TW

