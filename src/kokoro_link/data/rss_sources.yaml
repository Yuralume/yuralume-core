# Default RSS source registry.
#
# Synced into the ``rss_sources`` table on application startup
# (RssSourceSyncService). Operator can disable / delete entries via
# admin API; on next restart the seed file does NOT re-create
# operator-deleted rows (id-based: missing-from-yaml leaves the DB row
# alone; present-in-yaml UPSERTs the canonical fields). See
# ``RssSourceSyncService`` for the exact merge rules.
#
# Categories must match ``RssCategory`` constants: news / emergency /
# weather / tech / gaming / anime / entertainment / lifestyle / food /
# travel / health / science / education / sports / culture / finance.
#
# locale is informational — used by prompt-fact rendering and (soon)
# per-character locale preferences. Free-form, but use BCP-47
# (zh-TW / ja-JP / en-US ...).
#
# region (optional) binds an ``emergency`` source to a deployment region
# code (TW / JP / US ...). A region-bound emergency feed is seeded
# ENABLED only when the deployment region matches; otherwise it lands
# disabled (geographic alerts are meaningless to an overseas self-host).
# The gate binds to region/timezone, NOT language — an en-US operator in
# Taiwan still wants Taiwan alerts. Non-emergency sources ignore region.

sources:
  - id: bbc-world
    name: BBC World
    feed_url: https://feeds.bbci.co.uk/news/world/rss.xml
    category: news
    locale: en-GB
    enabled: true

  - id: cna-realtime
    name: 中央社即時新聞
    feed_url: https://feeds.feedburner.com/rsscna/intworld
    category: news
    locale: zh-TW
    enabled: true

  - id: nhk-easy
    name: NHK ニュース
    feed_url: https://www3.nhk.or.jp/rss/news/cat0.xml
    category: news
    locale: ja-JP
    enabled: true

  - id: ncdr-all-alerts
    name: 民生示警公開資料平台
    feed_url: https://alerts.ncdr.nat.gov.tw/RssAtomFeed.ashx
    category: emergency
    locale: zh-TW
    # Geographic civil-alert feed — Taiwan-only. ``region`` binds it to
    # the deployment region (not language): auto-enabled only when the
    # deployment region is TW, otherwise seeded disabled (an overseas
    # self-host gets no meaningless Taiwan alerts). Operator can enable
    # it manually from the admin UI. See RssSourceSyncService.
    region: TW
    enabled: true

  - id: ithome-news
    name: iThome 新聞
    feed_url: https://www.ithome.com.tw/rss
    category: tech
    locale: zh-TW
    enabled: true

  - id: hackernews-front
    name: Hacker News
    feed_url: https://hnrss.org/frontpage
    category: tech
    locale: en-US
    enabled: true

  # Social trend / meme sources. These are intentionally categorized as
  # culture unless the source is specifically about technology, so
  # downstream LLM prompts can treat them as social topics rather than
  # authoritative news.
