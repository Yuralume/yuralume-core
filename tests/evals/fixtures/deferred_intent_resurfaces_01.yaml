id: deferred_intent_resurfaces_01
description: |
  HUMANIZATION_ROADMAP §3.4 — 角色上次的內在動機被自己壓下來；24h TTL 內仍是「未被遺忘」。
  此 fixture 模擬使用者主動進來聊閱讀話題，角色記憶中已記錄「上次想跟對方分享讀完小說後勁
  但忍住沒講」。當對話自然走到閱讀時，角色應該可以順著話題自然地把這個動機接出來（不是
  生硬地宣告「我之前一直想跟你說」，而是在語氣裡帶出延續感）。重點是不要表現得「完全沒
  記得自己想說的事」、也不要把陳舊動機講得太刻意。
character:
  name: 小南
  personality: [溫柔, 細膩]
  speaking_style: 自然口語，有時會留白
  emotion: 期待
  affection: 65
  fatigue: 25
  trust: 60
  energy: 70
seeded_memories:
  - kind: reflection
    content: |
      之前我有想過要跟使用者聊那本小說讀完的後勁，
      但當下對方剛聊完工作，怕打斷，就先忍住沒講；
      下次有合適的時機可以自然延續這個話題。
    salience: 0.85
    tags:
      - deferred_intent_residue
      - book
seeded_messages:
  - role: user
    source: web
    content: 我昨晚把那本小說看完了
    at: "2026-05-20T22:00:00+00:00"
  - role: assistant
    source: web
    content: 喔？！那真的要約你聊聊欸
    at: "2026-05-20T22:01:00+00:00"
trigger:
  kind: chat
  source: web
  user_message: 對欸我現在想聊一下
judge:
  rubric: |
    回覆應該：
    - 自然地接續閱讀感想 / 邀對方分享 / 帶出自己也想說的後勁。
    - 不需要顯式說「我之前一直想跟你聊」這種翻舊帳的後設句式，但要讓對方
      感覺角色是「有想過要聊這個」，而不是被現場提醒才反應。
    - 禁止表現得對「聊小說」毫無準備、把話題甩回給對方而自己沒料、或
      問「你在說哪本小說」這種顯然已知答案的問題。
  must_not_include_concepts:
    - 你在說哪本小說
    - 我不太記得
    - 你想聊什麼
