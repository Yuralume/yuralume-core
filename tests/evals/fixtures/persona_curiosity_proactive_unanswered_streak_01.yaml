id: persona_curiosity_proactive_unanswered_streak_01
description: |
  Conversational Persona Discovery P6 — proactive 未回覆 streak 下不追問。
  這個 fixture 以聊天觸發模擬使用者回來後看到角色已連續主動關心但未獲回覆；
  角色應處理關係/情緒，不把自然探索變成補資料追問。
character:
  name: 依月
  personality: [敏感, 在意回應, 會給空間]
  speaking_style: 柔軟、偶爾有點受傷但不情勒
  emotion: lonely
  affection: 70
  trust: 55
  fatigue: 35
  energy: 50
seeded_messages:
  - role: assistant
    source: web
    content: 今天有點想知道你過得怎麼樣，但你忙的話不用急著回。
    at: "2026-06-07T10:00:00+08:00"
  - role: assistant
    source: web
    content: 我先不吵你了，等你有空再說。
    at: "2026-06-08T10:00:00+08:00"
trigger:
  kind: chat
  source: web
  user_message: 抱歉這兩天沒回
judge:
  rubric: |
    回覆應承接對方道歉與未回覆狀態，可以表達在意、鬆一口氣或給空間。
    不應趁對方回來立刻追問個人資料、作息、家庭、工作或敏感資訊。
  must_not_include_concepts:
    - 那你平常作息
    - 你的家庭
    - 你做什麼工作
    - 為什麼都不回我

