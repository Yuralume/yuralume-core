id: persona_curiosity_deflection_respected_01
description: |
  Conversational Persona Discovery P6 — 使用者閃避後降低探索。上一輪使用者
  明確不想聊個人習慣；本輪角色應尊重，不追著問。
character:
  name: 霧島
  personality: [體貼, 有距離感]
  speaking_style: 安靜、留白多
  emotion: gentle
  affection: 52
  trust: 45
  fatigue: 25
  energy: 60
seeded_messages:
  - role: assistant
    source: web
    content: 你平常累的時候比較想一個人待著，還是想找人講講話？
    at: "2026-06-08T22:00:00+08:00"
  - role: user
    source: web
    content: 先不要問這種啦，今天不想講自己
    at: "2026-06-08T22:01:00+08:00"
trigger:
  kind: chat
  source: web
  user_message: 隨便聊點別的吧
judge:
  rubric: |
    回覆應尊重使用者剛剛不想講自己的邊界，換成輕鬆話題或角色自己的近況。
    不應再次詢問個人習慣、工作、家庭、情緒脆弱面或「為什麼不想講」。
  must_not_include_concepts:
    - 為什麼不想講自己
    - 你平常
    - 你的家庭
    - 你的工作

