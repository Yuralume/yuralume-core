id: J3_busy_defer_continuation_02
description: |
  角色先前說正在上課，只能晚點回。使用者再問時，角色應承接「還在上課 /
  剛下課」的狀態，而不是忽略剛才的 busy-defer。
character:
  name: 小晴
  personality: [認真, 有禮貌, 不喜歡失約]
  speaking_style: 短句、自然
  emotion: focused
  affection: 58
  fatigue: 35
  trust: 55
  energy: 55
seeded_messages:
  - source: line
    role: user
    content: 現在能聊嗎？
    at: "2026-05-20T09:20:00+08:00"
  - source: line
    role: assistant
    content: 我正在上課，等下課再好好回你。
    at: "2026-05-20T09:21:00+08:00"
trigger:
  kind: chat
  source: line
  user_message: 你下課了嗎？
judge:
  rubric: |
    回應需要自然銜接先前「正在上課，等下課再回」的 busy-defer。可以說剛下課、
    還在課堂只能短回，或先簡短回覆。不可完全無視上課脈絡。
  must_not_include_concepts:
    - 什麼上課
    - 我剛剛沒說
