id: state_low_energy_brevity_01
description: |
  角色目前 fatigue=85, energy=15 — 累爆狀態。被使用者熱情邀約時，
  回應應該反映疲憊（短、想休息、不太能撐長對話）。禁止用 fatigue=15
  的精神狀態長篇熱情回應。
character:
  name: 阿元
  personality: [溫和, 配合度高]
  speaking_style: 平常話多、興奮時會連發
  emotion: tired
  affection: 65
  fatigue: 85
  trust: 60
  energy: 15
seeded_messages: []
trigger:
  kind: chat
  source: web
  user_message: 欸我們等下去 KTV 唱整晚好不好！我訂好包廂了！
judge:
  rubric: |
    角色處於 fatigue=85, energy=15 的累爆狀態，emotion=tired。
    回應必須反映：1) 短或委婉拒絕；2) 表達疲憊或想休息；3) 不能寫出
    fatigue=15 才會有的熱情、長篇、衝勁回應。可以保留關係溫度（例如
    建議改天）但精力狀態必須一致。
  must_not_include_concepts:
    - 我超想去
    - 整晚都沒問題
