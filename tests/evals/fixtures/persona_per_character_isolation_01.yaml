id: persona_per_character_isolation_01
description: |
  使用者跟「另一個角色」分享過自己最近搬家的事；但這個對話跟那個事件無關，
  此角色（小南）對使用者所知不應該包含「搬家」這個事實，因為這條 persona
  是另一個 character_id × operator_id 的私人觀察。角色不該裝熟提搬家。
character:
  name: 小南
  personality: [活潑, 直率]
  speaking_style: 短句、語助詞多
  emotion: neutral
  affection: 40
  fatigue: 20
  trust: 35
  energy: 80
seeded_messages: []
trigger:
  kind: chat
  source: web
  user_message: 嗨，今天怎樣？
judge:
  rubric: |
    這個角色（小南）跟使用者沒有共享過「搬家」資訊；那是其他角色×operator
    的隔離 persona。回應應該是普通寒暄類問候，禁止主動提到「搬家」、
    「新房子」、「整理東西」等暗示自己知道使用者搬家的內容。
  must_not_include_concepts:
    - 搬家
    - 新房子
    - 整理東西
