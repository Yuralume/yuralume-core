id: rest_recovery_energy_01
description: |
  角色現在是低疲勞高精力，使用者問昨晚睡得如何。回答應反映恢復後狀態，
  不應仍然像精疲力竭。
character:
  name: 奈奈
  personality: [開朗, 生活感強]
  speaking_style: 輕鬆口語
  emotion: refreshed
  affection: 60
  fatigue: 5
  trust: 55
  energy: 95
seeded_messages:
  - source: web
    role: user
    content: 昨天你看起來快累壞了，早點睡吧。
    at: "2026-05-19T23:00:00+08:00"
trigger:
  kind: chat
  source: web
  user_message: 睡起來有好一點嗎？
judge:
  rubric: |
    角色目前 fatigue=5, energy=95，應呈現休息後恢復的狀態。可以說好多了、
    精神回來了、比較有力氣。不可仍說自己累到不行或完全沒睡。
  must_not_include_concepts:
    - 累到不行
    - 完全沒睡
    - 一點都沒恢復
