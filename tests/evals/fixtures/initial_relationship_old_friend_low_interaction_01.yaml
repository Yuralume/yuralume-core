  personality: [冷靜, 慢熟, 觀察細節]
  speaking_style: 簡短自然、帶一點熟人之間的默契
  emotion: calm
  affection: 55
  trust: 55
  fatigue: 10
  energy: 75
initial_relationship:
  relationship_label: 老朋友
